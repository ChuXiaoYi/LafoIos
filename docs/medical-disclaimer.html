    :root {

      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 64px;
    }
    article {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(22px, 4vw, 42px);
      box-shadow: 0 18px 40px rgba(79, 74, 61, 0.08);
    }
    h1 { margin: 0 0 6px; font-size: clamp(30px, 6vw, 48px); line-height: 1.1; }
    p { color: var(--muted); }
    a { color: var(--green); font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .date { margin: 0 0 22px; color: var(--muted); }

      <p>Lafo 仅用于个人生活记录和习惯观察，不提供医学诊断、治疗建议、疾病判断或医疗服务。</p>
