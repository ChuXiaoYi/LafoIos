<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lafo 法律与隐私说明</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff8ec;
      --card: #ffffff;
      --text: #31281f;
      --muted: #766d63;
      --green: #4f8f64;
      --line: #eadfce;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #e9f7de 0, transparent 32rem), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.7;
    }
    main {
      width: min(840px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 18px 40px rgba(79, 74, 61, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 6vw, 54px);
      line-height: 1.08;
    }
    p { margin: 0 0 18px; color: var(--muted); }
    a {
      display: block;
      padding: 18px 0;
      color: var(--green);
      font-weight: 700;
      text-decoration: none;
      border-top: 1px solid var(--line);
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Lafo</h1>
      <p>Lafo 是一款本地优先的生活记录 App。这里提供 App Store 上架和用户查看所需的隐私、协议与免责声明。</p>
      <a href="./privacy-policy.html">隐私政策</a>
      <a href="./terms-of-use.html">用户协议</a>
      <a href="./medical-disclaimer.html">医疗免责声明</a>
    </section>
  </main>
</body>
</html>
